services:
  postgres:
    image: postgres:17
    container_name: bess-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bess_invoice}
      POSTGRES_USER: ${POSTGRES_USER:-bess_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bess_app_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: bess-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bess_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bess_minio_password}
    ports:
      - "${MINIO_API_PORT:-9001}:9000"
      - "${MINIO_CONSOLE_PORT:-9002}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: bess-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-bess_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-bess_minio_password}
      MINIO_BUCKET: ${MINIO_BUCKET:-bess-files}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing local/\"$${MINIO_BUCKET}\" &&
      mc version enable local/\"$${MINIO_BUCKET}\"
      "
    restart: "no"

volumes:
  postgres_data:
  minio_data:
